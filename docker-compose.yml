services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env.local
    environment:
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      OLLAMA_PREFER_LOCAL: "1"
      OLLAMA_BASE_URL_LOCAL: "http://host.docker.internal:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
