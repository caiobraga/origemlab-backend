services:
  api:
    build: .
    ports:
      # 8080 costuma estar ocupado (ex.: moneyprinterturbo); host 8081 → container 8080
      - "127.0.0.1:8081:8080"
    env_file:
      - .env.local
    environment:
      NODE_OPTIONS: "--dns-result-order=ipv4first"
      OLLAMA_PREFER_LOCAL: "1"
      OLLAMA_BASE_URL_LOCAL: "http://host.docker.internal:11434"
      # Modelo leve para campos longos (≥200 palavras); qualidade continua no 3B
      OLLAMA_FAST_MODEL: "qwen2.5:0.5b"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
