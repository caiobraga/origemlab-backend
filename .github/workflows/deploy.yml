name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: origemlab-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  APPRUNNER_SERVICE_ARN: ${{ vars.APPRUNNER_SERVICE_ARN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # ECR_REPOSITORY should normally be just the repo name (e.g. "origemlab-backend").
          # But if it's accidentally set to a full URI, normalize it.
          ECR_REPO_NAME="$(echo "$ECR_REPOSITORY" | sed -E "s#^${REGISTRY}/##" | sed -E 's#^[0-9]{12}\\.dkr\\.ecr\\.[a-z0-9-]+\\.amazonaws\\.com/##')"
          echo "Using ECR repo: ${ECR_REPO_NAME}"
          docker build -t "$REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG"
          echo "IMAGE_URI=$REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update App Runner service
        run: |
          aws apprunner update-service \
            --service-arn "${APPRUNNER_SERVICE_ARN}" \
            --source-configuration "ImageRepository={ImageIdentifier=${IMAGE_URI},ImageRepositoryType=ECR,ImageConfiguration={Port=8080}}"

