name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: origemlab-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # ECR_REPOSITORY should normally be just the repo name (e.g. "origemlab-backend").
          # But if it's accidentally set to a full URI, normalize it.
          ECR_REPO_NAME="$(echo "$ECR_REPOSITORY" | sed -E "s#^${REGISTRY}/##" | sed -E 's#^[0-9]{12}\\.dkr\\.ecr\\.[a-z0-9-]+\\.amazonaws\\.com/##')"
          echo "Using ECR repo: ${ECR_REPO_NAME}"
          docker build -t "$REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG"
          echo "IMAGE_URI=$REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Verify ECS variables
        run: |
          set -euo pipefail
          for v in AWS_REGION ECS_CLUSTER ECS_SERVICE ECS_CONTAINER_NAME ECR_REPOSITORY; do
            eval "val=\${$v:-}"
            if [ -z "${val}" ]; then
              echo "::error::Missing GitHub Actions variable: $v (configure in repo Settings → Secrets and variables → Actions → Variables)"
              exit 1
            fi
          done
          echo "AWS_REGION=${AWS_REGION}"
          echo "ECS_CLUSTER=${ECS_CLUSTER}"
          echo "ECS_SERVICE=${ECS_SERVICE}"
          echo "ECS_CONTAINER_NAME=${ECS_CONTAINER_NAME}"

      - name: Update ECS service (Fargate)
        run: |
          set -euo pipefail

          # Resolve current task definition ARN from the service (must exist and be deployed once).
          aws ecs describe-services \
            --region "${AWS_REGION}" \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --output json > svc.json

          python - <<'PY'
          import json, os, subprocess, sys

          def normalize_td(v):
              if v is None:
                  return ""
              s = str(v).strip()
              if not s or s in ("None", "null"):
                  return ""
              return s

          def aws_json(args):
              out = subprocess.check_output(["aws", *args], text=True)
              return json.loads(out)

          svc = json.load(open("svc.json"))
          services = svc.get("services") or []
          failures = svc.get("failures") or []

          if failures:
              print("DescribeServices failures:", json.dumps(failures, indent=2))
              sys.exit(1)

          if not services:
              print(
                  "::error::Nenhum serviço retornado. Confira ECS_CLUSTER e ECS_SERVICE "
                  "(ex.: cluster default, service origemlab-backend-47ad)."
              )
              sys.exit(1)

          s0 = services[0] or {}
          status = s0.get("status") or ""
          running = s0.get("runningCount")
          desired = s0.get("desiredCount")
          print(f"Service status={status} running={running} desired={desired}")

          # Root taskDefinition is sometimes null in API responses; deployments carry the ARN.
          td_arn = normalize_td(s0.get("taskDefinition"))
          if td_arn:
              print("Using task definition from service.taskDefinition")

          if not td_arn:
              deployments = s0.get("deployments") or []
              for d in sorted(
                  deployments,
                  key=lambda x: 0 if (x or {}).get("status") == "PRIMARY" else 1,
              ):
                  td_arn = normalize_td((d or {}).get("taskDefinition"))
                  if td_arn:
                      print(
                          "Using task definition from deployment "
                          f"status={(d or {}).get('status')!r}"
                      )
                      break

          if not td_arn:
              region = os.environ["AWS_REGION"]
              cluster = os.environ["ECS_CLUSTER"]
              service_name = os.environ["ECS_SERVICE"]
              try:
                  lt = aws_json(
                      [
                          "ecs",
                          "list-tasks",
                          "--region",
                          region,
                          "--cluster",
                          cluster,
                          "--service-name",
                          service_name,
                          "--desired-status",
                          "RUNNING",
                          "--output",
                          "json",
                      ]
                  )
                  arns = lt.get("taskArns") or []
                  if arns:
                      dt = aws_json(
                          [
                              "ecs",
                              "describe-tasks",
                              "--region",
                              region,
                              "--cluster",
                              cluster,
                              "--tasks",
                              arns[0],
                              "--output",
                              "json",
                          ]
                      )
                      tasks = dt.get("tasks") or []
                      if tasks:
                          td_arn = normalize_td(tasks[0].get("taskDefinitionArn"))
                          if td_arn:
                              print("Using task definition from a RUNNING task")
              except subprocess.CalledProcessError as e:
                  print(f"list-tasks/describe-tasks fallback failed: {e}")

          if not td_arn:
              print(
                  "::error::Não foi possível obter o ARN da task definition "
                  "(service, deployments nem task em RUNNING)."
              )
              sys.exit(1)

          open(".td_arn", "w", encoding="utf-8").write(td_arn)
          print(f"Current task definition ARN: {td_arn}")
          PY

          TD_ARN="$(cat .td_arn)"

          aws ecs describe-task-definition \
            --region "${AWS_REGION}" \
            --task-definition "${TD_ARN}" \
            --query taskDefinition \
            --output json > taskdef.json

          python - <<'PY'
          import json, os
          td = json.load(open("taskdef.json"))
          # remove read-only fields
          for k in [
            "taskDefinitionArn","revision","status","requiresAttributes","compatibilities",
            "registeredAt","registeredBy"
          ]:
            td.pop(k, None)
          want = os.environ.get("ECS_CONTAINER_NAME") or ""
          image = os.environ["IMAGE_URI"]
          defs = td.get("containerDefinitions") or []
          names = [c.get("name") for c in defs]

          updated = False
          for c in defs:
              if c.get("name") == want:
                  c["image"] = image
                  updated = True
                  print(f"Patched container matching ECS_CONTAINER_NAME={want!r}")
                  break

          if not updated and len(defs) == 1:
              defs[0]["image"] = image
              updated = True
              print(
                  "::warning::ECS_CONTAINER_NAME "
                  f"{want!r} not found; task definition has a single container "
                  f"{names[0]!r}, patching that one. Set ECS_CONTAINER_NAME to match."
              )

          if not updated:
              raise SystemExit(
                  f"Container name not found in task definition: {want!r}. "
                  f"Found container names: {names}"
              )
          json.dump(td, open("taskdef.new.json","w"))
          print("Wrote taskdef.new.json with image:", image)
          PY

          NEW_TD_ARN="$(aws ecs register-task-definition \
            --region "${AWS_REGION}" \
            --cli-input-json file://taskdef.new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          echo "Registered new task definition: ${NEW_TD_ARN}"

          aws ecs update-service \
            --region "${AWS_REGION}" \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${NEW_TD_ARN}" \
            --force-new-deployment

