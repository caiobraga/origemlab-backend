# Deploy to AWS Elastic Beanstalk — Node.js platform (no Docker / ECR).
# EB runs `npm start`; PORT is set by the environment (default 8080).
#
# GitHub Variables: AWS_REGION, AWS_ROLE_ARN, EB_APPLICATION_NAME, EB_ENVIRONMENT_NAME,
# EB_DEPLOY_BUCKET (staging bucket name, no s3:// prefix).
# IAM: .github/aws-iam-policy-beanstalk-deploy.json
#
# Repository secrets (synced to EB each deploy via aws:elasticbeanstalk:application:environment):
#   SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
# Optional secrets (included when set): STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
# Optional vars: APP_BASE_URL, CORS_ALLOW_ORIGIN

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: origemlab-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  EB_APPLICATION_NAME: ${{ vars.EB_APPLICATION_NAME }}
  EB_ENVIRONMENT_NAME: ${{ vars.EB_ENVIRONMENT_NAME }}
  EB_DEPLOY_BUCKET: ${{ vars.EB_DEPLOY_BUCKET }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}
      CORS_ALLOW_ORIGIN: ${{ vars.CORS_ALLOW_ORIGIN }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify deployment variables
        run: |
          set -euo pipefail
          for v in AWS_REGION AWS_ROLE_ARN EB_APPLICATION_NAME EB_ENVIRONMENT_NAME EB_DEPLOY_BUCKET; do
            eval "val=\${$v:-}"
            if [ -z "${val}" ]; then
              echo "::error::Missing GitHub Actions variable: $v"
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Install, build, and deploy to Elastic Beanstalk
        run: |
          set -euo pipefail
          npm ci
          npm run build

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Set repository secrets SUPABASE_URL and SUPABASE_ANON_KEY (they are pushed to EB as env vars)."
            exit 1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY is empty; API routes that need the service role will fail."
          fi

          VERSION_LABEL="origemlab-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}"
          zip -r bundle.zip \
            package.json \
            package-lock.json \
            dist \
            Procfile \
            .ebextensions

          KEY="beanstalk/${VERSION_LABEL}.zip"
          aws s3 cp bundle.zip "s3://${EB_DEPLOY_BUCKET}/${KEY}"

          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle "S3Bucket=${EB_DEPLOY_BUCKET},S3Key=${KEY}"

          echo "Checking application version status..."
          ST=""
          for _ in $(seq 1 36); do
            ST="$(aws elasticbeanstalk describe-application-versions \
              --application-name "${EB_APPLICATION_NAME}" \
              --version-labels "${VERSION_LABEL}" \
              --query 'ApplicationVersions[0].Status' --output text 2>/dev/null || echo "")"
            case "${ST}" in
              PROCESSED)
                echo "Version ${VERSION_LABEL} is PROCESSED."
                break
                ;;
              FAILED)
                echo "::error::Application version processing FAILED for ${VERSION_LABEL}"
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done
          ST="$(aws elasticbeanstalk describe-application-versions \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-labels "${VERSION_LABEL}" \
            --query 'ApplicationVersions[0].Status' --output text 2>/dev/null || echo "")"
          if [ "${ST}" != "PROCESSED" ]; then
            echo "::warning::Version status is still '${ST:-unknown}'. Continuing with update-environment."
          fi

          export VERSION_LABEL
          python3 << 'PY'
          import json, os

          ns = "aws:elasticbeanstalk:application:environment"
          keys = [
              "SUPABASE_URL",
              "SUPABASE_ANON_KEY",
              "SUPABASE_SERVICE_ROLE_KEY",
              "APP_BASE_URL",
              "CORS_ALLOW_ORIGIN",
              "STRIPE_SECRET_KEY",
              "STRIPE_WEBHOOK_SECRET",
          ]
          opts = []
          for k in keys:
              v = (os.environ.get(k) or "").strip()
              if v:
                  opts.append({"Namespace": ns, "OptionName": k, "Value": v})

          payload = {
              "EnvironmentName": os.environ["EB_ENVIRONMENT_NAME"],
              "VersionLabel": os.environ["VERSION_LABEL"],
              "OptionSettings": opts,
          }
          with open("eb-update.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          PY

          aws elasticbeanstalk update-environment --cli-input-json file://eb-update.json

          echo "Deployed version ${VERSION_LABEL} to ${EB_ENVIRONMENT_NAME}"
