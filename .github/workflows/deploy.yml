name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: origemlab-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # ECR_REPOSITORY should normally be just the repo name (e.g. "origemlab-backend").
          # But if it's accidentally set to a full URI, normalize it.
          ECR_REPO_NAME="$(echo "$ECR_REPOSITORY" | sed -E "s#^${REGISTRY}/##" | sed -E 's#^[0-9]{12}\\.dkr\\.ecr\\.[a-z0-9-]+\\.amazonaws\\.com/##')"
          echo "Using ECR repo: ${ECR_REPO_NAME}"
          docker build -t "$REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG"
          echo "IMAGE_URI=$REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update ECS service (Fargate)
        run: |
          TD_ARN="$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}" \
            --query 'services[0].taskDefinition' \
            --output text)"
          echo "Current task definition: ${TD_ARN}"

          aws ecs describe-task-definition \
            --task-definition "${TD_ARN}" \
            --query taskDefinition \
            --output json > taskdef.json

          python - <<'PY'
          import json, os
          td = json.load(open("taskdef.json"))
          # remove read-only fields
          for k in [
            "taskDefinitionArn","revision","status","requiresAttributes","compatibilities",
            "registeredAt","registeredBy"
          ]:
            td.pop(k, None)
          name = os.environ["ECS_CONTAINER_NAME"]
          image = os.environ["IMAGE_URI"]
          updated = False
          for c in td.get("containerDefinitions", []):
            if c.get("name") == name:
              c["image"] = image
              updated = True
          if not updated:
            raise SystemExit(f"Container name not found in task definition: {name}")
          json.dump(td, open("taskdef.new.json","w"))
          print("Wrote taskdef.new.json with image:", image)
          PY

          NEW_TD_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://taskdef.new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          echo "Registered new task definition: ${NEW_TD_ARN}"

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --task-definition "${NEW_TD_ARN}" \
            --force-new-deployment

