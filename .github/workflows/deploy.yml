# Deploy to AWS Elastic Beanstalk — Node.js platform (no Docker / ECR).
# EB runs `npm start`; PORT is set by the environment (default 8080).
#
# GitHub Variables: AWS_REGION, AWS_ROLE_ARN, EB_APPLICATION_NAME, EB_ENVIRONMENT_NAME,
# EB_DEPLOY_BUCKET, optional EB_ENV_S3_KEY (default: config/elasticbeanstalk-env.json).
# Optional vars merged into S3 env JSON: APP_BASE_URL, CORS_ALLOW_ORIGIN, etc.
#
# Repository secrets: used only in CI to build & upload env JSON to S3 (not committed).
# At runtime the app reads that object via APP_ENV_S3_* (see src/env.ts).
#
# IAM (OIDC deploy role): .github/aws-iam-policy-beanstalk-deploy.json
# IAM (EB EC2 instance): .github/aws-iam-eb-instance-role-s3-env.json
#
# HTTPS na API: o URL *.elasticbeanstalk.com é só HTTP. Use CloudFront à frente do EB:
#   infrastructure/cloudfront-api.yaml (stack CloudFormation — ver comentários no ficheiro).
# Depois define no JSON de env (S3): APP_BASE_URL=https://<distribution>.cloudfront.net,
# AUTH_COOKIE_SECURE=true, CORS_ALLOW_ORIGIN com os HTTPS origins do front (vários separados
# por vírgula, ou * só para testes). No GitHub do front: VITE_API_BASE_URL com o mesmo HTTPS.

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: origemlab-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  EB_APPLICATION_NAME: ${{ vars.EB_APPLICATION_NAME }}
  EB_ENVIRONMENT_NAME: ${{ vars.EB_ENVIRONMENT_NAME }}
  EB_DEPLOY_BUCKET: ${{ vars.EB_DEPLOY_BUCKET }}
  EB_ENV_S3_KEY: ${{ vars.EB_ENV_S3_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify deployment variables
        run: |
          set -euo pipefail
          for v in AWS_REGION AWS_ROLE_ARN EB_APPLICATION_NAME EB_ENVIRONMENT_NAME EB_DEPLOY_BUCKET; do
            eval "val=\${$v:-}"
            if [ -z "${val}" ]; then
              echo "::error::Missing GitHub Actions variable: $v"
              exit 1
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Install, build, upload env to S3, deploy to Elastic Beanstalk
        env:
          EB_ENV_S3_KEY: ${{ vars.EB_ENV_S3_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          AISELFIE_STRIPE_SECRET_KEY: ${{ secrets.AISELFIE_STRIPE_SECRET_KEY }}
          AISELFIE_STRIPE_WEBHOOK_SECRET: ${{ secrets.AISELFIE_STRIPE_WEBHOOK_SECRET }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CORS_ALLOW_ORIGIN: ${{ vars.CORS_ALLOW_ORIGIN }}
          AUTH_COOKIE_NAME: ${{ vars.AUTH_COOKIE_NAME }}
          AUTH_COOKIE_SECURE: ${{ vars.AUTH_COOKIE_SECURE }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          OLLAMA_TIMEOUT_MS: ${{ vars.OLLAMA_TIMEOUT_MS }}
        run: |
          set -euo pipefail
          npm ci
          npm run build

          export EB_ENV_S3_KEY="${EB_ENV_S3_KEY:-config/elasticbeanstalk-env.json}"

          python3 << 'PY'
          import json, os, sys

          keys = [
              "SUPABASE_URL",
              "SUPABASE_ANON_KEY",
              "SUPABASE_SERVICE_ROLE_KEY",
              "STRIPE_SECRET_KEY",
              "STRIPE_WEBHOOK_SECRET",
              "AISELFIE_STRIPE_SECRET_KEY",
              "AISELFIE_STRIPE_WEBHOOK_SECRET",
              "APP_BASE_URL",
              "CORS_ALLOW_ORIGIN",
              "AUTH_COOKIE_NAME",
              "AUTH_COOKIE_SECURE",
              "OLLAMA_BASE_URL",
              "OLLAMA_MODEL",
              "OLLAMA_TIMEOUT_MS",
          ]
          data = {}
          for k in keys:
              v = (os.environ.get(k) or "").strip()
              if v:
                  data[k] = v

          if not data.get("SUPABASE_URL") or not data.get("SUPABASE_ANON_KEY"):
              print("::error::Secrets SUPABASE_URL and SUPABASE_ANON_KEY are required to build the S3 env JSON.", file=sys.stderr)
              sys.exit(1)

          with open("elasticbeanstalk-env.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False)
          print(f"Built elasticbeanstalk-env.json with {len(data)} keys (values not logged).")
          PY

          aws s3 cp elasticbeanstalk-env.json "s3://${EB_DEPLOY_BUCKET}/${EB_ENV_S3_KEY}"
          echo "Uploaded s3://${EB_DEPLOY_BUCKET}/${EB_ENV_S3_KEY}"

          VERSION_LABEL="origemlab-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}"
          zip -r bundle.zip \
            package.json \
            package-lock.json \
            dist \
            Procfile \
            .ebextensions

          KEY="beanstalk/${VERSION_LABEL}.zip"
          aws s3 cp bundle.zip "s3://${EB_DEPLOY_BUCKET}/${KEY}"

          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle "S3Bucket=${EB_DEPLOY_BUCKET},S3Key=${KEY}"

          echo "Checking application version status..."
          ST=""
          for _ in $(seq 1 36); do
            ST="$(aws elasticbeanstalk describe-application-versions \
              --application-name "${EB_APPLICATION_NAME}" \
              --version-labels "${VERSION_LABEL}" \
              --query 'ApplicationVersions[0].Status' --output text 2>/dev/null || echo "")"
            case "${ST}" in
              PROCESSED)
                echo "Version ${VERSION_LABEL} is PROCESSED."
                break
                ;;
              FAILED)
                echo "::error::Application version processing FAILED for ${VERSION_LABEL}"
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done
          ST="$(aws elasticbeanstalk describe-application-versions \
            --application-name "${EB_APPLICATION_NAME}" \
            --version-labels "${VERSION_LABEL}" \
            --query 'ApplicationVersions[0].Status' --output text 2>/dev/null || echo "")"
          if [ "${ST}" != "PROCESSED" ]; then
            echo "::warning::Version status is still '${ST:-unknown}'. Continuing with update-environment."
          fi

          export VERSION_LABEL
          python3 << 'PY'
          import json, os

          ns = "aws:elasticbeanstalk:application:environment"
          bucket = os.environ["EB_DEPLOY_BUCKET"]
          key = (os.environ.get("EB_ENV_S3_KEY") or "").strip() or "config/elasticbeanstalk-env.json"
          opts = [
              {"Namespace": ns, "OptionName": "APP_ENV_S3_BUCKET", "Value": bucket},
              {"Namespace": ns, "OptionName": "APP_ENV_S3_KEY", "Value": key},
              {"Namespace": ns, "OptionName": "APP_ENV_LOAD_FROM_S3", "Value": "true"},
          ]
          region = (os.environ.get("AWS_REGION") or "").strip()
          if region:
              opts.append({"Namespace": ns, "OptionName": "AWS_REGION", "Value": region})

          payload = {
              "EnvironmentName": os.environ["EB_ENVIRONMENT_NAME"],
              "VersionLabel": os.environ["VERSION_LABEL"],
              "OptionSettings": opts,
          }
          with open("eb-update.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          PY

          aws elasticbeanstalk update-environment --cli-input-json file://eb-update.json

          echo "Deployed version ${VERSION_LABEL} to ${EB_ENVIRONMENT_NAME}"
